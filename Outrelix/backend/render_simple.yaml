services:
  - type: web
    name: outrelix-api-simple
    env: python
    plan: free
    buildCommand: pip install -r requirements_minimal.txt
    startCommand: uvicorn main_simple:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
