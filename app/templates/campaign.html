<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Setup - Email Outreach Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f6f8fc 0%, #e9f0f7 100%);
        }
        .card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .gradient-text {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen p-4">
    <div class="max-w-3xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold gradient-text mb-2">Campaign Setup</h1>
            <p class="text-gray-600">Configure your email outreach campaign</p>
        </div>

        <div class="card p-6">
            <form id="campaignForm" class="space-y-6">
                <div>
                    <label for="industry" class="block text-sm font-medium text-gray-700">Industry</label>
                    <input type="text" id="industry" name="industry" value="{{ industry }}" readonly
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 bg-gray-50">
                </div>

                <div>
                    <label for="sender_email" class="block text-sm font-medium text-gray-700">Sender Email</label>
                    <input type="email" id="sender_email" name="sender_email" required
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
                        placeholder="your.email@example.com">
                </div>

                <div>
                    <label for="email_template" class="block text-sm font-medium text-gray-700">Email Template</label>
                    <textarea id="email_template" name="email_template" rows="6" required
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
                        placeholder="Enter your email template here..."></textarea>
                    <p class="mt-2 text-sm text-gray-500">
                        Available variables: {company}, {name}, {position}
                    </p>
                </div>

                <div>
                    <label for="subject" class="block text-sm font-medium text-gray-700">Email Subject</label>
                    <input type="text" id="subject" name="subject" required
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
                        placeholder="Enter email subject...">
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="schedule" name="schedule"
                        class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                    <label for="schedule" class="ml-2 block text-sm text-gray-700">
                        Schedule campaign for later
                    </label>
                </div>

                <div id="scheduleOptions" class="hidden">
                    <label for="schedule_time" class="block text-sm font-medium text-gray-700">Schedule Time</label>
                    <input type="datetime-local" id="schedule_time" name="schedule_time"
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                </div>

                <div class="flex justify-end space-x-4">
                    <button type="button" onclick="window.history.back()"
                        class="inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Cancel
                    </button>
                    <button type="submit"
                        class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Start Campaign
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Show/hide schedule options
        document.getElementById('schedule').addEventListener('change', function() {
            const scheduleOptions = document.getElementById('scheduleOptions');
            scheduleOptions.classList.toggle('hidden', !this.checked);
        });

        // Handle form submission
        document.getElementById('campaignForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = {
                industry: document.getElementById('industry').value,
                sender_email: document.getElementById('sender_email').value,
                email_template: document.getElementById('email_template').value,
                subject: document.getElementById('subject').value,
                schedule: document.getElementById('schedule').checked,
                schedule_time: document.getElementById('schedule_time').value
            };

            try {
                const response = await fetch('/api/campaign/start', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.status === 'success') {
                    // Redirect to dashboard
                    window.location.href = `/campaign/dashboard?campaign_id=${data.campaign_id}`;
                } else {
                    alert('Error starting campaign: ' + data.detail);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error starting campaign. Please try again.');
            }
        });
    </script>
</body>
</html>
