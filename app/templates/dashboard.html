<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Dashboard - Email Outreach Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f6f8fc 0%, #e9f0f7 100%);
        }
        .card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .gradient-text {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .premium-badge {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #000;
            font-weight: 600;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }
        .premium-badge svg {
            width: 0.875rem;
            height: 0.875rem;
        }
        .industry-card {
            transition: all 0.3s ease;
        }
        .industry-card:hover {
            transform: translateY(-2px);
        }
        .premium-card {
            border: 2px solid transparent;
            background: linear-gradient(white, white) padding-box,
                        linear-gradient(135deg, #FFD700, #FFA500) border-box;
        }
    </style>
</head>
<body class="min-h-screen p-4">
    <div class="max-w-7xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold gradient-text mb-2">Campaign Dashboard</h1>
            <p class="text-gray-600">Monitor your email outreach campaign</p>
        </div>

        <!-- Industry Selection Section -->
        <div class="card p-6 mb-8">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">Select Industry</h3>
            <div class="flex items-center gap-4">
                <!-- Custom Dropdown Only -->
                <div class="relative w-64" id="customDropdownContainer">
                    <button id="dropdownBtn" type="button" class="w-full border rounded-md px-4 py-2 bg-white text-left focus:ring-indigo-500 focus:border-indigo-500 flex justify-between items-center">
                        <span id="selectedIndustry">Select Industry</span>
                        <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                    </button>
                    <ul id="dropdownList" class="absolute z-10 w-full bg-white border rounded-md mt-1 shadow-lg hidden max-h-60 overflow-y-auto">
                        <!-- Options will be populated here -->
                    </ul>
                </div>
                <button id="startCampaignBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-md font-medium hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">Start Campaign</button>
                <span id="campaignLoading" class="ml-2 text-sm text-gray-500 hidden">Starting...</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Stats Card -->
            <div class="card p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Campaign Stats</h3>
                <div class="space-y-4">
                    <div class="flex justify-between">
                        <span class="text-gray-600">Total Leads</span>
                        <span class="font-semibold" id="totalLeads">0</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-600">Emails Sent</span>
                        <span class="font-semibold" id="emailsSent">0</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-600">Success Rate</span>
                        <span class="font-semibold" id="successRate">0%</span>
                    </div>
                </div>
            </div>

            <!-- Progress Card -->
            <div class="card p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Campaign Progress</h3>
                <div class="space-y-4">
                    <div class="relative pt-1">
                        <div class="flex mb-2 items-center justify-between">
                            <div>
                                <span class="text-xs font-semibold inline-block py-1 px-2 uppercase rounded-full text-indigo-600 bg-indigo-200">
                                    Progress
                                </span>
                            </div>
                            <div class="text-right">
                                <span class="text-xs font-semibold inline-block text-indigo-600" id="progressPercentage">
                                    0%
                                </span>
                            </div>
                        </div>
                        <div class="overflow-hidden h-2 mb-4 text-xs flex rounded bg-indigo-200">
                            <div id="progressBar" style="width:0%" class="shadow-none flex flex-col text-center whitespace-nowrap text-white justify-center bg-indigo-500"></div>
                        </div>
                    </div>
                    <div class="text-sm text-gray-600">
                        <p>Campaign started: <span id="startTime" class="font-semibold">-</span></p>
                        <p>Estimated completion: <span id="endTime" class="font-semibold">-</span></p>
                    </div>
                </div>
            </div>

            <!-- Recent Activity Card -->
            <div class="card p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Recent Activity</h3>
                <div class="space-y-4" id="activityLog">
                    <div class="text-sm text-gray-600">
                        <p>Campaign initialized...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Download Section -->
        <div class="mt-8 card p-6">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">Download Results</h3>
            <div class="flex space-x-4">
                <button onclick="downloadCSV()" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Download CSV
                </button>
                <button onclick="downloadJSON()" class="inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Download JSON
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Get campaign ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const campaignId = urlParams.get('campaign_id');

            // Custom Dropdown Logic
            let industriesData = {};
            let selectedIndustry = null;
            const dropdownBtn = document.getElementById('dropdownBtn');
            const dropdownList = document.getElementById('dropdownList');
            const selectedIndustrySpan = document.getElementById('selectedIndustry');

            async function loadIndustriesCustomDropdown() {
                try {
                    const response = await fetch('/industries');
                    industriesData = await response.json();
                    dropdownList.innerHTML = '';
                    for (const [name, info] of Object.entries(industriesData)) {
                        const li = document.createElement('li');
                        li.className = 'px-4 py-2 cursor-pointer hover:bg-indigo-50 flex items-center';
                        if (!info.scrapable) {
                            li.innerHTML = `<svg class='w-4 h-4 mr-2 text-yellow-500' fill='none' stroke='currentColor' viewBox='0 0 24 24'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 17a2 2 0 002-2v-2a2 2 0 00-2-2 2 2 0 00-2 2v2a2 2 0 002 2zm0 0v1m0-1a4 4 0 01-4-4V9a4 4 0 018 0v4a4 4 0 01-4 4z' /></svg> <span>${name} <span class='text-xs text-yellow-600 font-semibold ml-1'>(Premium)</span></span>`;
                            li.classList.add('opacity-60', 'pointer-events-none');
                        } else {
                            li.textContent = name;
                        }
                        li.dataset.value = name;
                        dropdownList.appendChild(li);
                    }
                } catch (error) {
                    console.error('Error loading industries:', error);
                }
            }
            loadIndustriesCustomDropdown();

            dropdownBtn.addEventListener('click', function(e) {
                dropdownList.classList.toggle('hidden');
            });
            document.addEventListener('click', function(e) {
                if (!dropdownBtn.contains(e.target) && !dropdownList.contains(e.target)) {
                    dropdownList.classList.add('hidden');
                }
            });
            dropdownList.addEventListener('click', function(e) {
                const li = e.target.closest('li');
                if (li && !li.classList.contains('pointer-events-none')) {
                    selectedIndustry = li.dataset.value;
                    selectedIndustrySpan.textContent = selectedIndustry;
                    dropdownList.classList.add('hidden');
                }
            });

            // Start campaign button logic
            document.getElementById('startCampaignBtn').addEventListener('click', async function() {
                const loading = document.getElementById('campaignLoading');
                if (!selectedIndustry) {
                    alert('Please select an industry.');
                    return;
                }
                loading.classList.remove('hidden');
                try {
                    const response = await fetch('/scrape', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ industry: selectedIndustry })
                    });
                    const data = await response.json();
                    if (data && data.redirect_url) {
                        window.location.href = data.redirect_url;
                    } else {
                        window.location.href = `/campaign/setup?industry=${selectedIndustry}`;
                    }
                } catch (error) {
                    alert('Failed to start campaign: ' + error);
                } finally {
                    loading.classList.add('hidden');
                }
            });

            // Update dashboard data
            async function updateDashboard() {
                try {
                    // Get campaign status
                    const response = await fetch(`/api/campaign/${campaignId}/status`);
                    const data = await response.json();

                    // Update stats
                    document.getElementById('totalLeads').textContent = data.total_leads || 0;
                    document.getElementById('emailsSent').textContent = data.emails_sent || 0;
                    document.getElementById('successRate').textContent = `${data.success_rate || 0}%`;

                    // Update progress
                    const progress = data.progress || 0;
                    document.getElementById('progressBar').style.width = `${progress}%`;
                    document.getElementById('progressPercentage').textContent = `${progress}%`;

                    // Update times
                    if (data.started_at) {
                        document.getElementById('startTime').textContent = new Date(data.started_at).toLocaleString();
                    }
                    if (data.estimated_completion) {
                        document.getElementById('endTime').textContent = new Date(data.estimated_completion).toLocaleString();
                    }

                    // Update activity log
                    if (data.recent_activity && data.recent_activity.length > 0) {
                        const activityLog = document.getElementById('activityLog');
                        activityLog.innerHTML = ''; // Clear existing entries
                        data.recent_activity.forEach(activity => {
                            const entry = document.createElement('div');
                            entry.className = 'text-sm text-gray-600';
                            entry.textContent = activity;
                            activityLog.appendChild(entry);
                        });
                    }

                    // Schedule next update
                    setTimeout(updateDashboard, 5000);
                } catch (error) {
                    console.error('Error updating dashboard:', error);
                    // Retry after error
                    setTimeout(updateDashboard, 5000);
                }
            }

            // Download functions
            async function downloadCSV() {
                try {
                    const response = await fetch(`/api/campaign/${campaignId}/download?format=csv`);
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `campaign_${campaignId}.csv`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    a.remove();
                } catch (error) {
                    console.error('Error downloading CSV:', error);
                    alert('Error downloading CSV file');
                }
            }

            async function downloadJSON() {
                try {
                    const response = await fetch(`/api/campaign/${campaignId}/download?format=json`);
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `campaign_${campaignId}.json`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    a.remove();
                } catch (error) {
                    console.error('Error downloading JSON:', error);
                    alert('Error downloading JSON file');
                }
            }

            // Initialize dashboard
            if (campaignId) {
                updateDashboard();
            }
        });
    </script>
</body>
</html>
